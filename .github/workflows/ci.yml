name: Spring Boot CI

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Give execute permission to Maven Wrapper
        run: chmod +x mvnw

      - name: Build application
        run: ./mvnw clean verify

      - name: Set lowercase repository owner
        run: |
          echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t ghcr.io/${{ env.OWNER_LC }}/spring-lab:${{ github.sha }} \
            -t ghcr.io/${{ env.OWNER_LC }}/spring-lab:latest \
            .

      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ env.OWNER_LC }}/spring-lab:${{ github.sha }}
          docker push ghcr.io/${{ env.OWNER_LC }}/spring-lab:latest

      - name: Show published image
        run: |
          echo "Image published:"
          echo "ghcr.io/${{ env.OWNER_LC }}/spring-lab:${{ github.sha }}"