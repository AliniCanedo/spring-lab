name: Spring Boot CI

on:
  push:
    branches:
      - master

permissions:
  contents: read
  packages: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - run: chmod +x mvnw

      - run: ./mvnw clean verify

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Image
        run: |
          docker build \
          -t ghcr.io/${{ github.repository_owner }}/spring-lab:${{ github.sha }} \
          -t ghcr.io/${{ github.repository_owner }}/spring-lab:latest .

      - name: Push Image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/spring-lab:${{ github.sha }}
          docker push ghcr.io/${{ github.repository_owner }}/spring-lab:latest