replicaCount: 1

image:
  repository: ghcr.io/alinicanedo/spring-lab
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8081

container:
  port: 8081

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  path: /actuator/health/liveness

readinessProbe:
  path: /actuator/health/readiness

env:
  SPRING_PROFILES_ACTIVE: dev